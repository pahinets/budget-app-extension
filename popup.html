<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Реєстр Часу</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1A1A1A;
      --paper:  #F8F7F4;
      --muted:  #6b7280;
      --red:    #991b1b;
      --green:  #166534;
      --border: #1A1A1A;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--ink);
      width: 380px;
      min-height: 480px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
    }
    .header-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .25em;
      text-transform: uppercase;
      opacity: .7;
      color: #4b5563;
      margin-bottom: 4px;
    }
    .header-title {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-style: italic;
      letter-spacing: -.04em;
      line-height: 1;
    }
    .header-date {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      opacity: .5;
      margin-top: 4px;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: white;
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink);
      opacity: .4;
      border-bottom: 2px solid transparent;
      transition: opacity .15s, border-color .15s;
    }
    .tab-btn:hover { opacity: .7; }
    .tab-btn.active { opacity: 1; border-bottom-color: var(--ink); }

    /* ── Content ── */
    .content { flex: 1; padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .panel { display: none; flex-direction: column; gap: 12px; }
    .panel.active { display: flex; }

    /* ── Section label ── */
    .section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      opacity: .6;
      margin-bottom: 2px;
    }

    /* ── Status card ── */
    .status-card {
      border: 1px solid var(--border);
      background: white;
      padding: 14px 16px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
    }
    .site-name {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-style: italic;
    }
    .time-display {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
    }
    .time-display.over { color: var(--red); }
    .progress-track {
      width: 100%;
      height: 2px;
      background: rgba(26,26,26,.1);
    }
    .progress-fill {
      height: 100%;
      background: var(--ink);
      transition: width .3s;
    }
    .progress-fill.over { background: var(--red); }
    .pct-label {
      font-size: 9px;
      letter-spacing: .1em;
      opacity: .5;
      margin-top: 4px;
      text-align: right;
    }

    /* ── Empty state ── */
    .empty {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 14px;
      opacity: .4;
      text-align: center;
      padding: 20px 0;
    }

    /* ── Form elements ── */
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      opacity: .7;
    }
    .field input, .field select {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(26,26,26,.3);
      padding: 4px 0 6px;
      outline: none;
      color: var(--ink);
      width: 100%;
      transition: border-color .15s;
    }
    .field input:focus, .field select:focus { border-bottom-color: var(--ink); }

    .site-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(26,26,26,.08);
    }
    .site-row:last-child { border-bottom: none; }
    .site-row-name { font-family: 'Playfair Display', serif; font-size: 14px; font-style: italic; }
    .site-row-limit { font-size: 11px; opacity: .6; }
    .btn-remove {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--red);
      background: none;
      border: none;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
      padding: 2px 4px;
    }
    .site-row:hover .btn-remove { opacity: 1; }

    /* ── Buttons ── */
    .btn-primary {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      background: var(--ink);
      color: white;
      border: none;
      padding: 10px 16px;
      cursor: pointer;
      width: 100%;
      transition: background .15s;
    }
    .btn-primary:hover { background: black; }
    .btn-primary:disabled { opacity: .4; cursor: default; }

    .btn-text {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      background: none;
      border: none;
      border-bottom: 1px solid var(--ink);
      cursor: pointer;
      padding: 1px 2px 2px;
      color: var(--ink);
      transition: background .15s, color .15s;
    }
    .btn-text:hover { background: var(--ink); color: white; }

    .row-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }

    /* ── Summary row ── */
    .summary {
      display: flex;
      gap: 12px;
      border: 1px solid var(--border);
      background: white;
      padding: 12px 16px;
    }
    .summary-item { flex: 1; }
    .summary-val {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      letter-spacing: -.03em;
      line-height: 1;
    }
    .summary-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      opacity: .5;
      margin-top: 3px;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      opacity: .4;
      display: flex;
      justify-content: space-between;
    }

    .inline-form { display: flex; gap: 8px; align-items: flex-end; }
    .inline-form .field { flex: 1; }
    .inline-form .btn-text { white-space: nowrap; margin-bottom: 6px; }

    .add-block {
      border: 1px solid var(--border);
      background: white;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .badge-blocked {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--red);
      border: 1px solid var(--red);
      padding: 1px 5px;
    }
    .badge-ok {
      font-size: 8px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--green);
      border: 1px solid var(--green);
      padding: 1px 5px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-label">Реєстр Часу</div>
  <div class="header-title">Контроль доступу</div>
  <div class="header-date" id="header-date"></div>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="overview">Огляд</button>
  <button class="tab-btn" data-tab="sites">Сайти</button>
  <button class="tab-btn" data-tab="settings">Параметри</button>
</div>

<div class="content">

  <!-- OVERVIEW -->
  <div class="panel active" id="tab-overview">
    <div id="summary-block" class="summary"></div>
    <div class="section-label">Активність сьогодні</div>
    <div id="usage-list"></div>
  </div>

  <!-- SITES -->
  <div class="panel" id="tab-sites">
    <div class="section-label">Відстежувані сайти</div>
    <div id="sites-list"></div>

    <div class="add-block">
      <div class="section-label">Додати сайт</div>
      <div class="two-col">
        <div class="field">
          <label>Домен</label>
          <input type="text" id="new-site" placeholder="example.com" />
        </div>
        <div class="field">
          <label>Ліміт (хв)</label>
          <input type="number" id="new-limit" placeholder="30" min="1" max="1440" />
        </div>
      </div>
      <button class="btn-primary" id="btn-add-site">Додати до реєстру</button>
    </div>
  </div>

  <!-- SETTINGS -->
  <div class="panel" id="tab-settings">
    <div class="section-label">Глобальні параметри</div>

    <div class="field">
      <label>Стандартний ліміт (хв)</label>
      <input type="number" id="default-limit" placeholder="30" min="1" max="1440" />
    </div>

    <div class="row-actions">
      <button class="btn-text" id="btn-reset-today">Скинути сьогоднішній облік</button>
      <button class="btn-text" id="btn-unblock-all">Розблокувати всі</button>
    </div>

    <div style="margin-top:8px;">
      <button class="btn-primary" id="btn-save-settings">Застосувати зміни</button>
    </div>

    <div style="border-top:1px solid rgba(26,26,26,.1); padding-top:12px; margin-top:4px;">
      <div class="section-label" style="margin-bottom:8px;">Небезпечна зона</div>
      <button class="btn-text" id="btn-clear-all" style="color:var(--red); border-color:var(--red);">Очистити всі дані</button>
    </div>
  </div>

</div>

<footer>
  <span>Time Ledger v1.0</span>
  <span id="footer-status"></span>
</footer>

<script src="popup.js"></script>
</body>
</html>
