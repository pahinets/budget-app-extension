<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Доступ обмежено — Реєстр Часу</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:   #1A1A1A;
      --paper: #F8F7F4;
      --red:   #991b1b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.25rem, 5vw, 2.5rem) clamp(1rem, 4vw, 1.25rem);
    }
    .masthead { text-align: center; margin-bottom: clamp(1.5rem, 5vw, 3rem); }
    .masthead-label {
      font-size: 10px; font-weight: 700; letter-spacing: .3em;
      text-transform: uppercase; opacity: .6; margin-bottom: 8px;
    }
    .masthead-rule {
      width: 60px; height: 1px; background: var(--ink);
      margin: 0 auto 20px; opacity: .3;
    }
    .card {
      border: 1px solid var(--ink);
      background: white;
      padding: clamp(1.5rem, 5vw, 3rem) clamp(1.25rem, 5vw, 3.5rem);
      width: 100%;
      max-width: 600px;
      text-align: center;
    }
    .card-issue {
      font-size: 9px; font-weight: 700; letter-spacing: .3em;
      text-transform: uppercase; opacity: .5; margin-bottom: 14px;
    }
    .card-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 10vw, 3rem);
      font-style: italic; letter-spacing: -.04em;
      line-height: 1.05; margin-bottom: 8px;
    }
    .card-site {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1rem, 4vw, 1.25rem);
      color: var(--red); margin-bottom: clamp(1rem, 4vw, 2rem); font-style: italic;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .divider {
      width: 100%; height: 1px; background: var(--ink);
      opacity: .1; margin: clamp(1rem, 3vw, 1.5rem) 0;
    }
    .stats {
      display: flex; justify-content: center;
      gap: clamp(1.5rem, 5vw, 3rem); margin: clamp(1rem, 3vw, 1.75rem) 0;
      flex-wrap: wrap;
    }
    .stat-item { text-align: center; }
    .stat-val {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.75rem, 7vw, 2.25rem);
      letter-spacing: -.04em; line-height: 1; margin-bottom: 4px;
    }
    .stat-val.red { color: var(--red); }
    .stat-lbl {
      font-size: 8px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; opacity: .5;
    }
    .progress-wrap { margin: clamp(1rem, 3vw, 1.5rem) 0 8px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 9px; font-weight: 600; letter-spacing: .12em;
      text-transform: uppercase; opacity: .5; margin-bottom: 7px;
    }
    .progress-track { width: 100%; height: 2px; background: rgba(26,26,26,.1); }
    .progress-fill { height: 100%; background: var(--red); }
    .card-body {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-size: clamp(0.875rem, 3vw, 1rem);
      line-height: 1.6; opacity: .7; margin: clamp(1rem, 3vw, 1.5rem) 0;
    }
    .card-cols {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      gap: 0 clamp(0.75rem, 3vw, 1.5rem);
      text-align: left; margin: clamp(1rem, 3vw, 1.5rem) 0;
    }
    .col-divider { background: rgba(26,26,26,.12); }
    .col-label {
      font-size: 9px; font-weight: 700; letter-spacing: .2em;
      text-transform: uppercase; opacity: .5; margin-bottom: 4px;
    }
    .col-val { font-family: 'Playfair Display', serif; font-size: clamp(0.875rem, 3vw, 0.9375rem); font-style: italic; }
    .actions {
      display: flex; gap: 12px; justify-content: center;
      margin-top: clamp(1.25rem, 4vw, 2rem); flex-wrap: wrap;
    }
    .btn-back, .btn-override {
      font-family: 'Inter', sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: .2em; text-transform: uppercase;
      padding: clamp(0.75rem, 3vw, 0.875rem) clamp(1rem, 4vw, 1.75rem);
      cursor: pointer; min-height: 48px;
      flex: 1 1 auto; max-width: 200px;
    }
    .btn-back {
      background: var(--ink); color: white; border: none;
      transition: background .15s;
      text-decoration: none; display: inline-flex;
      align-items: center; justify-content: center;
    }
    .btn-back:hover { background: black; }
    .btn-override {
      background: transparent; color: var(--ink);
      border: 1px solid var(--ink);
      transition: background .15s, color .15s;
    }
    .btn-override:hover { background: var(--ink); color: white; }
    .countdown {
      font-size: 10px; font-weight: 600; letter-spacing: .15em;
      text-transform: uppercase; opacity: .4; margin-top: 16px;
      min-height: 18px;
    }
    @media (max-width: 360px) {
      .card-cols {
        grid-template-columns: 1fr;
        gap: 1rem 0;
      }
      .col-divider { display: none; }
      .stats { gap: 1.25rem; }
    }
  </style>
</head>
<body>

<div class="masthead">
  <div class="masthead-label">Реєстр Часу • Time Ledger</div>
  <div class="masthead-rule"></div>
</div>

<div class="card">
  <div class="card-issue">Доступ обмежено — Ліміт вичерпано</div>
  <h1 class="card-headline">Сеанс<br>завершено</h1>
  <div class="card-site" id="site-display">—</div>

  <div class="divider"></div>

  <div class="stats">
    <div class="stat-item">
      <div class="stat-val red" id="stat-used">—</div>
      <div class="stat-lbl">Використано</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="stat-limit">—</div>
      <div class="stat-lbl">Ліміт</div>
    </div>
    <div class="stat-item">
      <div class="stat-val" id="stat-over">—</div>
      <div class="stat-lbl">Перевищення</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>0</span>
      <span id="prog-label">100%+</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:100%"></div>
    </div>
  </div>

  <div class="divider"></div>

  <p class="card-body">
    Ви досягли денного ліміту перебування на цьому ресурсі.
    Доступ буде автоматично відновлено опівночі.
  </p>

<div class="card-cols">
    <div>
      <div class="col-label">Скидання</div>
      <div class="col-val" id="reset-time">Опівночі</div>
    </div>
    <div class="col-divider"></div>
    <div>
      <div class="col-label">Залишок дня</div>
      <div class="col-val" id="time-left">—</div>
    </div>
  </div>

  <div class="actions">
    <button class="btn-back" id="btn-back">
      ← Повернутися
    </button>
    <button class="btn-override" id="btn-override">
      Ігнорувати ліміт
    </button>
  </div>

  <div class="countdown" id="countdown"></div>
</div>

<script src="blocked.js"></script>
</body>
</html>
